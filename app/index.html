<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta name="google-site-verification" content="أدخل_كود_التحقق_الخاص_بك_هنا" />

    <title>الموقع الرسمي لمزار ميثم التمار رضي الله عنه</title>
    
    <meta name="description" content="الموقع الرسمي لمزار الصحابي الجليل ميثم بن يحيى التمار في الكوفة المقدسة." />
    
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#05140d">
    
    <style>
      /* الحل النهائي لمشكلة الألوان في أندرويد وسامسونج */
      :root {
        forced-color-adjust: none !important;
        -webkit-forced-color-adjust: none !important;
        color-scheme: dark !important;
      }

      /* استهداف العناوين التي تظهر باللون الأحمر */
      h1, h2, h3, h4, .text-gold, [class*="text-yellow"] {
        color: #cca354 !important; /* اللون الذهبي */
        -webkit-text-fill-color: #cca354 !important; /* إجبار المحرك على ملء النص بهذا اللون */
        fill: #cca354 !important;
        forced-color-adjust: none !important;
      }

      /* استهداف النصوص البيضاء التي تظهر باللون الأصفر */
      p, span, div, li, .text-white {
        color: #ffffff !important;
        -webkit-text-fill-color: #ffffff !important;
        forced-color-adjust: none !important;
      }

      /* منع المتصفح من تطبيق أي فلاتر ليلية على الموقع */
      html, body {
        background-color: #05140d !important;
        filter: none !important;
      }
    </style>

    <meta property="og:title" content="مزار ميثم التمار - الموقع الرسمي" />
    <meta property="og:image" content="https://www.mazaraltammar.com/logo.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "مزار ميثم التمار",
      "url": "https://www.mazaraltammar.com",
      "logo": "https://www.mazaraltammar.com/logo.png"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
